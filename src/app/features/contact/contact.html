<app-section-shell
  kicker="Contatti"
  wideHeader
  title="Costruiamo qualcosa insieme."
  description="Se vuoi contribuire a questo archivio vivo, aprire un processo condiviso o proporre una collaborazione, qui trovi i canali per entrare nella struttura, attraversarla e lasciare una traccia utile."
>
  <div class="section-body">
    <div class="flex flex-wrap gap-3">
      @for (area of areas; track area) {
        <span class="pill-tag">{{ area | readableKey }}</span>
      }
    </div>

    <div class="grid gap-5 md:grid-cols-2">
      @for (channel of channels; track channel.value) {
        <a
          class="contact-channel-card group flex flex-col justify-between"
          [href]="channel.href"
          [attr.target]="channel.external ? '_blank' : null"
          [attr.rel]="channel.external ? 'noopener noreferrer' : null"
        >
          <div class="space-y-4">
            <div class="flex items-center gap-3 text-xs uppercase tracking-[0.18em] text-white/45">
              <span
                class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-white/12 bg-white/[0.08] text-[1rem] text-white/78 backdrop-blur-md transition group-hover:border-white/18 group-hover:bg-white/[0.12] group-hover:text-white"
              >
                <fa-icon [icon]="channel.icon"></fa-icon>
              </span>
              <span>{{ channel.label }}</span>
            </div>
            <div class="text-xl font-medium leading-tight text-white md:text-2xl">
              {{ channel.value }}
            </div>
          </div>

          <div class="mt-6 flex items-end justify-between gap-4">
            <div class="max-w-[26ch] text-sm leading-6 text-white/60 group-hover:text-white/72">
              {{ channel.description }}
            </div>
            <span
              class="inline-flex h-10 w-10 shrink-0 items-center justify-center rounded-full border border-white/12 bg-white/[0.08] text-[1rem] text-white/75 backdrop-blur-md transition group-hover:bg-white/[0.12] group-hover:text-white"
            >
              <fa-icon [icon]="externalLinkIcon"></fa-icon>
            </span>
          </div>
        </a>
      }
    </div>

    <app-contact-form></app-contact-form>
  </div>
</app-section-shell>
