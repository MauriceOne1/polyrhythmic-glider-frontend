<app-section-shell
  kicker="Contatti"
  title="Costruiamo qualcosa insieme."
  description="Polyrhythmic Glider e uno spazio in continua evoluzione dedicato a musica elettronica, ricerca sonora, sperimentazione analogica e strumenti digitali. Se vuoi collaborare o proporre un progetto, qui trovi una base piu chiara e testabile."
>
  <div class="space-y-10">
    <div class="flex flex-wrap gap-3">
      @for (area of areas; track area) {
        <span class="pill-tag">{{ area | readableKey }}</span>
      }
    </div>

    <div class="grid gap-4 md:grid-cols-2">
      @for (channel of channels; track channel.value) {
        <a
          class="soft-card group"
          [href]="channel.href"
          [attr.target]="channel.external ? '_blank' : null"
          [attr.rel]="channel.external ? 'noopener noreferrer' : null"
        >
          <div class="text-xs uppercase tracking-[0.18em] text-white/45">
            {{ channel.label }}
          </div>
          <div class="mt-3 text-lg font-medium text-white">
            {{ channel.value }}
          </div>
          <div class="mt-3 text-sm leading-6 text-white/55 group-hover:text-white/70">
            {{ channel.description }}
          </div>
        </a>
      }
    </div>

    <app-contact-form></app-contact-form>
  </div>
</app-section-shell>
