<header class="header-wrap">
  <div class="page-frame header">
    <div class="header-top">
      <a class="brand" routerLink="/" (click)="navigateHome($event)">
        Polyrhythmic Glider
      </a>

      <button
        class="menu-toggle"
        type="button"
        [attr.aria-expanded]="isMenuOpen()"
        aria-label="Apri menu di navigazione"
        (click)="toggleMenu()"
      >
        <span class="menu-toggle-line" [class.is-open]="isMenuOpen()"></span>
        <span class="menu-toggle-line" [class.is-open]="isMenuOpen()"></span>
        <span class="menu-toggle-line" [class.is-open]="isMenuOpen()"></span>
      </button>
    </div>

    <nav class="nav" [class.is-open]="isMenuOpen()">
      @for (item of navItems; track item.fragment) {
        @if (item.fragment === 'hero') {
          <a class="nav-link" routerLink="/" (click)="navigateHome($event)">
            {{ item.label }}
          </a>
        } @else {
          <a
            class="nav-link"
            routerLink="/"
            [fragment]="item.fragment"
            (click)="closeMenu()"
          >
            {{ item.label }}
          </a>
        }
      }
    </nav>
  </div>
</header>
