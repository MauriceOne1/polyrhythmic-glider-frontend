<header class="header-wrap">
  <div class="page-frame header">
    <a class="brand" routerLink="/" fragment="hero">Polyrhythmic Glider</a>

    <nav class="nav">
      @for (item of navItems; track item.fragment) {
        <a routerLink="/" [fragment]="item.fragment">{{ item.label }}</a>
      }
    </nav>
  </div>
</header>
