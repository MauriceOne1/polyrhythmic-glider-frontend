<header class="header-wrap">
  <div class="page-frame header">
    <div class="header-top">
      <a class="brand" [routerLink]="homeRoute" (click)="navigateHome($event)">
        <span>polyrhythmic</span>
        <span>glider</span>
      </a>

      <button
        class="menu-toggle"
        type="button"
        [attr.aria-expanded]="isMenuOpen()"
        aria-controls="primary-navigation"
        [attr.aria-label]="isMenuOpen() ? 'Chiudi menu di navigazione' : 'Apri menu di navigazione'"
        (click)="toggleMenu()"
      >
        <span class="menu-toggle-line" [class.is-open]="isMenuOpen()"></span>
        <span class="menu-toggle-line" [class.is-open]="isMenuOpen()"></span>
        <span class="menu-toggle-line" [class.is-open]="isMenuOpen()"></span>
      </button>
    </div>

    <nav
      id="primary-navigation"
      class="nav"
      aria-label="Navigazione principale"
      [class.is-open]="isMenuOpen()"
    >
      @for (item of navItems; track item.label) {
        @if (item.externalHref) {
          <a class="nav-link" [href]="item.externalHref" (click)="closeMenu()">
            {{ item.label }}
          </a>
        } @else if (item.href) {
          <a class="nav-link" [routerLink]="item.href" (click)="closeMenu()">
            {{ item.label }}
          </a>
        } @else if (item.fragment === 'hero') {
          <a class="nav-link" routerLink="/" (click)="navigateHome($event)">
            {{ item.label }}
          </a>
        } @else {
          <a class="nav-link" routerLink="/" [fragment]="item.fragment" (click)="closeMenu()">
            {{ item.label }}
          </a>
        }
      }

      @if (isLoggedIn()) {
        <button class="nav-link nav-action" type="button" (click)="logout()">Logout</button>
      }
    </nav>
  </div>
</header>
