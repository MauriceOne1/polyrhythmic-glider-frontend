<div class="toast-viewport" aria-live="polite" aria-atomic="true">
  @for (message of toast.messages(); track message.id) {
    <aside
      class="toast-message"
      [class.is-warning]="message.tone === 'warning'"
    >
      @if (message.eyebrow) {
        <span class="toast-eyebrow-row">
          <span class="toast-prompt" aria-hidden="true">&gt;</span>
          <span class="toast-eyebrow">{{ message.eyebrow }}</span>
        </span>
      }

      <strong>{{ message.title }}</strong>
      <span>{{ message.message }}</span>

      <button
        class="toast-dismiss"
        type="button"
        aria-label="Chiudi notifica"
        (click)="toast.dismiss(message.id)"
      >
        esc
      </button>
    </aside>
  }
</div>
