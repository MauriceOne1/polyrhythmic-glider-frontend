<section class="section-shell">
  <div class="section-kicker">
    {{ kicker() }}
  </div>

  <div class="section-body">
    @if (title() || description()) {
      <div
        class="readable-copy-card space-y-4"
        [class.max-w-3xl]="!wideHeader()"
        [class.max-w-none]="wideHeader()"
        [class.w-full]="wideHeader()"
      >
        @if (title()) {
          <h2 class="section-title">
            {{ title() }}
          </h2>
        }

        @if (description()) {
          <p class="section-description">
            {{ description() }}
          </p>
        }
      </div>
    }

    <ng-content />
  </div>
</section>
